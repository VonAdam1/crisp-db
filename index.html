        body { 
            font-family: 'Outfit', sans-serif;

            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #121214 0%, #030303 70%);

            /* FIX: Sidan tillåts nu alltid att skrolla vertikalt om innehållet är högre än skärmen */
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .glass-card { 
            background: rgba(18, 18, 20, 0.75); 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            border-radius: 1.25rem;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: relative;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease, border-color 0.25s ease;
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }
        
        @media (min-width: 768px) {
            .glass-card:hover { 
                border-color: rgba(255, 255, 255, 0.15); 
                box-shadow: 0 35px 80px -20px rgba(0, 0, 0, 0.9); 
                z-index: 10; 
                cursor: grab; 
            }
            .glass-card:active { 
                cursor: grabbing; 
                transform: scale(0.992); 
            }
        }
        
        .transparent-container {
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            overflow: visible;
        }
        
        .glass-card.dragging { 
            opacity: 0.4; 
            border: 2px dashed rgba(255, 255, 255, 0.2); 
            background: rgba(255, 255, 255, 0.02); 
            box-shadow: none; 
            cursor: grabbing; 
        }
        
        .resize-handle { 
            position: absolute; 
            bottom: 0; 
            right: 0; 
            width: 24px; 
            height: 24px; 
            cursor: nwse-resize; 
            z-index: 50; 
            opacity: 0; 
            transition: opacity 0.2s ease; 
            display: none; 
        }
        
        @media (min-width: 768px) { 
            .resize-handle { display: block; } 
            .glass-card:hover .resize-handle { opacity: 0.7; } 
            .glass-card:hover .resize-handle:hover { opacity: 1; }
        }
        
        .resize-handle::after { 
            content: ''; 
            position: absolute; 
            bottom: 6px; 
            right: 6px; 
            width: 6px; 
            height: 6px; 
            border-bottom: 2px solid rgba(255, 255, 255, 0.5); 
            border-right: 2px solid rgba(255, 255, 255, 0.5); 
            border-radius: 1px; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-in { 
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(6px) scale(0.99); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .modal-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(2, 2, 3, 0.85); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            z-index: 100; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .modal-overlay.open { 
            opacity: 1; 
            pointer-events: auto; 
        }
        
        .gpu-accelerate { 
            transform: translateZ(0); 
            backface-visibility: hidden; 
        }

        .toggle-checkbox:checked { right: 0; border-color: #10B981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
    </style>

                    {width > 700 ? (

        };

        // --- 5. MODALS & DIALOGS ---

        const HelpModal = ({ onClose }) => (

                <div className="glass-card p-6 max-w-md w-full m-4 border border-white/10" onClick={e => e.stopPropagation()}>

                    </div>
                    <div className="text-slate-300 text-sm space-y-3 font-medium">
                        <p className="bg-white/5 p-2.5 rounded-lg border border-white/5">💡 Dra och släpp korten i rubrikområdena för att skräddarsy din layout (Desktop).</p>
                        <p className="bg-white/5 p-2.5 rounded-lg border border-white/5">📐 Använd handtaget längst ner till höger på varje kort för att ändra storleken.</p>
                        <p className="bg-white/5 p-2.5 rounded-lg border border-white/5">📊 Klicka på de olika KPI-blocken i produktionsmodulen för djupgående projektspecifikationer.</p>
                        <p className="text-xs text-slate-500 pt-2 text-center">Dashboard v2.2 • Crisp Film</p>

        const SettingsModal = ({ showRevenue, toggleRevenue, currentYear, setYear, onClose }) => {

                        {items && items.length > 0 ? items.map((item, i) => (
                             <div key={i} className="flex justify-between items-center p-3 bg-white/[0.01] rounded-xl border border-white/[0.03] hover:bg-white/[0.03] transition-colors gap-4">
                                 <span className="text-slate-200 font-medium text-sm truncate">{item.name || item.project}</span>
                                 <div className="text-right shrink-0 flex flex-col gap-0.5">
                                     <div className="text-[10px] text-slate-400 uppercase font-black tracking-wider bg-white/5 px-2 py-0.5 rounded border border-white/5 inline-block">{item.status || item.date}</div>
                                     {item.budget > 0 && <div className="text-xs text-emerald-400 font-mono font-bold mt-1">{item.budget.toLocaleString('sv-SE')} kr</div>}
                                 </div>
                             </div>
                        )) : <p className="text-slate-500 italic py-4 text-center text-sm">Inga registrerade projekt i denna kategori.</p>}
                    </div>
                </div>
            </div>
        );

        // --- 6. CORE APPLICATION CONTEXT ---

        const DEFAULT_MODULES = [ 
            { id: 'production', colSpan: 12, rowSpan: 3, component: 'ProductionModule' }, 
            { id: 'timeline', colSpan: 12, rowSpan: 3, component: 'TimelineModule' }, 
            { id: 'slideshow', colSpan: 12, rowSpan: 2, component: 'SlideshowModule' }, 
        ];

        const App = () => {
            const [time, setTime] = useState(new Date());
            const [weather, setWeather] = useState(null); const [loadingWeather, setLoadingWeather] = useState(true);
            const [birthdays, setBirthdays] = useState([]); const [loadingBirthdays, setLoadingBirthdays] = useState(true);
            const [prodStats, setProdStats] = useState(null); const [loadingProd, setLoadingProd] = useState(true);
            const [nameDays, setNameDays] = useState("Laddar..."); const [loadingNameDays, setLoadingNameDays] = useState(true); 
            const [bookings, setBookings] = useState([]);
            const [customText, setCustomText] = useState({ title: "Every frame counts", subtitle: "Life at Crisp" });
            
            const [showHelp, setShowHelp] = useState(false); 
            const [showSettings, setShowSettings] = useState(false);
            
            const [showRevenue, setShowRevenue] = useState(() => {
                try { return localStorage.getItem('dashboard_show_revenue') === 'true'; } catch(e) { return false; }
            });

            const [year, setYear] = useState(() => {
                try { return localStorage.getItem('dashboard_year') || new Date().getFullYear().toString(); } catch(e) { return new Date().getFullYear().toString(); }
            });

            const toggleRevenueHandler = () => {
                setShowRevenue(prev => {
                    const newVal = !prev;
                    localStorage.setItem('dashboard_show_revenue', String(newVal));
                    return newVal;
                });
            };

            const setYearHandler = (newYear) => {
                setYear(newYear);
                localStorage.setItem('dashboard_year', newYear);
            };

            const [detailModal, setDetailModal] = useState(null); 
            const RELOAD_COOLDOWN_MS = 10 * 60 * 1000; 

            const [modules, setModules] = useState(() => {
                try {
                    const saved = localStorage.getItem('dashboard_layout_v2');
                    if (saved) return JSON.parse(saved);
                } catch(e) { console.error("Layout load failed", e); }
                return DEFAULT_MODULES;
            });

            useEffect(() => {
                try { localStorage.setItem('dashboard_layout_v2', JSON.stringify(modules)); } catch(e) {}
            }, [modules]);

            const [draggedId, setDraggedId] = useState(null); const [resizingId, setResizingId] = useState(null);

            const onDragStart = (e, id) => { if (window.innerWidth >= 768 && !resizingId) { setDraggedId(id); e.currentTarget.classList.add('dragging'); } };
            const onDragEnd = (e) => { setDraggedId(null); e.currentTarget.classList.remove('dragging'); };
            const onDrop = (targetId) => { if (window.innerWidth < 768 || !draggedId || draggedId === targetId) return; const n = [...modules]; const d = n.findIndex(m => m.id === draggedId); const t = n.findIndex(m => m.id === targetId); const tmp = n[d]; n.splice(d, 1); n.splice(t, 0, tmp); setModules(n); };
            const handleResizeStart = (e, id) => { if (window.innerWidth < 768) return; e.preventDefault(); e.stopPropagation(); setResizingId(id); const sx = e.clientX; const sy = e.clientY; const idx = modules.findIndex(m => m.id === id); const sc = modules[idx].colSpan; const sr = modules[idx].rowSpan; const cw = (window.innerWidth - 64) / 12; const ch = 156; const onMM = (me) => { const c = Math.max(4, Math.min(12, sc + Math.round((me.clientX-sx)/cw))); const r = Math.max(2, Math.min(6, sr + Math.round((me.clientY-sy)/ch))); setModules(p => { const nx = [...p]; if(nx[idx].colSpan !== c || nx[idx].rowSpan !== r) nx[idx]={...nx[idx], colSpan:c, rowSpan:r}; return nx; }); }; const onMU = () => { setResizingId(null); document.removeEventListener('mousemove', onMM); document.removeEventListener('mouseup', onMU); }; document.addEventListener('mousemove', onMM); document.addEventListener('mouseup', onMU); };

            const openDetails = (title, items) => { setDetailModal({ title, items }); };

            const renderModuleContent = (mod) => {
                 const allUpcoming = [
                    ...(prodStats?.recordings || []).map(r => ({ ...r, type: 'recording', title: r.project, subtitle: r.isStream ? 'Stream' : (r.isVO ? 'Voiceover' : 'Inspelning') }))
                ].sort((a, b) => a.sortDate - b.sortDate).slice(0, 10); 
                switch(mod.component) { 
                    case 'ProductionModule': return <ProductionModule stats={prodStats?.stats} recent={prodStats?.recentDeliveries} loading={loadingProd} showRevenue={showRevenue} year={year} onOpenDetails={openDetails} />; 
                    case 'SlideshowModule': return <SlideshowModule customText={customText} />; 
                    case 'TimelineModule': return <TimelineModule items={allUpcoming} bookings={bookings} loading={loadingProd} />; 
                    default: return null; 
                }
            };

            const loadMainData = async () => {
                setLoadingWeather(true); setLoadingBirthdays(true); setLoadingNameDays(true); setLoadingProd(true); 
                try { setWeather(await getRealWeather()); } catch(e){}
                try { setBirthdays(await getClickUpBirthdays()); } catch(e){}
                try { setBookings(await getRoomBookings()); } catch(e){}
                try { setNameDays(await getNamnsdagar()); } catch(e) { setNameDays("Kunde inte hämta"); }
                
                try { 
                    const newStats = await getClickUpProductionData(year); 
                    setProdStats(newStats); 
                } catch(e) { console.error(e); }

                setLoadingWeather(false); setLoadingBirthdays(false); setLoadingNameDays(false); setLoadingProd(false);
            };

            // Övervaka ändringar i prodStats för att trigga konfetti när ett nytt projekt landas
            useEffect(() => {
                if (prodStats && prodStats.stats) {
                    const currentSold = prodStats.stats.soldCount;
                    const prevSold = parseInt(localStorage.getItem('dashboard_prev_sold_count') || '-1');
                    
                    if (prevSold !== -1 && currentSold > prevSold) {
                        // Nytt projekt sålt! Sätt timer för 10 minuter konfetti
                        const endTime = Date.now() + (10 * 60 * 1000);
                        localStorage.setItem('dashboard_confetti_end', endTime.toString());
                    }
                    localStorage.setItem('dashboard_prev_sold_count', currentSold.toString());
                }
            }, [prodStats]);

            useEffect(() => { loadMainData(); }, [year]);

            useEffect(() => {
                const t = setInterval(() => {
                    const now = new Date();
                    setTime(now);

                    // Konfetti-logik: Spruta lite konfetti varje sekund om timern är aktiv
                    if (window.confetti) {
                        const confettiEnd = parseInt(localStorage.getItem('dashboard_confetti_end') || '0');
                        if (Date.now() < confettiEnd) {
                            window.confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff'] });
                            window.confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff'] });
                        }
                    }
                }, 1000);

                const loadTextOnly = async () => {
                    try {
                        const data = await getGoogleSheetMotto();
                        if(data) {
                            setCustomText(prev => (prev.title === data.title && prev.subtitle === data.subtitle) ? prev : { title: data.title, subtitle: data.subtitle });
                            if (data.shouldReload === 'RELOAD') {
                                const now = Date.now();
                                const lastReload = parseInt(localStorage.getItem('last_reload_timestamp_v2') || '0');
                                if (now - lastReload > RELOAD_COOLDOWN_MS) {
                                    localStorage.setItem('last_reload_timestamp_v2', now.toString());
                                    window.location.reload();
                                }
                            } 
                        }
                    } catch(e){}
                };

                loadTextOnly();
                const textInterval = setInterval(loadTextOnly, 10000);
                
                // Kontrollera klockan varje minut för att hämta data exakt kl 09, 12, 15 och 17
                const scheduleInterval = setInterval(() => { 
                    const now = new Date();
                    const h = now.getHours();
                    const m = now.getMinutes();
                    if ((h === 9 || h === 12 || h === 15 || h === 17) && m === 0) {
                        loadMainData();
                    }
                }, 60000); 

                return () => { clearInterval(t); clearInterval(textInterval); clearInterval(scheduleInterval); };
            }, []);

            const timeStr = time.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' }); 
            const dateStr = time.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });

            return (
                <div className="min-h-screen p-4 md:p-6 flex flex-col md:h-screen bg-[#030303] relative select-none">
                    {/* HUVUDHEADER */}
                    <header className="flex flex-col md:flex-row gap-4 justify-between items-center mb-6 px-2 pt-2 animate-in shrink-0 z-40 text-center md:text-left">
                         <div className="flex flex-col items-center md:items-start">
                             <div className="flex items-center gap-3 bg-white/[0.01] border border-white/5 px-4 py-2 rounded-xl backdrop-blur-sm shadow-inner">
                                <img src={LOGO_SYMBOL} alt="Crisp" className={`${DASHBOARD_CONFIG.design.logoSymbolHeightMobile} md:${DASHBOARD_CONFIG.design.logoSymbolHeightDesktop} w-auto object-contain`} onError={(e) => e.target.style.display = 'none'} />
                                <div className="w-px h-8 bg-white/10 mx-1"></div>
                                <img src={LOGO_TEXT} alt="Crisp Film" className={`${DASHBOARD_CONFIG.design.logoTextHeightMobile} md:${DASHBOARD_CONFIG.design.logoTextHeightDesktop} w-auto object-contain mt-0.5`} onError={(e) => e.target.style.display = 'none'} />
                             </div>
                        </div>
                        
                        <div className="flex flex-col items-center justify-center">
                            <div className={`${DASHBOARD_CONFIG.design.clockSizeMobile} md:${DASHBOARD_CONFIG.design.clockSizeDesktop} font-black text-white tracking-tighter leading-none filter drop-shadow-[0_4px_12px_rgba(0,0,0,0.5)]`}>{timeStr}</div>
                            <div className={`text-slate-400 ${DASHBOARD_CONFIG.design.dateSizeMobile} md:${DASHBOARD_CONFIG.design.dateSizeDesktop} capitalize font-semibold tracking-wide mt-1 mb-1.5`}>{dateStr}</div>
                            <p className="text-slate-500 text-[11px] md:text-xs font-bold tracking-widest uppercase opacity-90 whitespace-nowrap bg-white/[0.02] px-3 py-1 rounded-full border border-white/[0.03]">We make brands stronger through film</p>
                        </div>
                        
                        <div className="flex flex-row md:flex-col items-center md:items-end justify-center gap-3 flex-wrap">
                             <HeaderWeather weather={weather} loading={loadingWeather} />
                             <HeaderInfoModule nameDays={loadingNameDays ? "Laddar..." : nameDays} birthdays={loadingBirthdays ? [] : birthdays} />
                        </div>
                    </header>
                    
                    {/* SYSTEMKNAPPAR */}
                    <button onClick={() => setShowSettings(true)} className="fixed bottom-5 left-5 text-slate-500 hover:text-white transition-colors z-50 p-2 rounded-xl bg-white/[0.02] hover:bg-white/10 border border-white/5 shadow-lg backdrop-blur-sm"><Settings size={18} /></button>
                    <button onClick={() => setShowHelp(true)} className="fixed bottom-5 left-16 text-slate-500 hover:text-white transition-colors z-50 p-2 rounded-xl bg-white/[0.02] hover:bg-white/10 border border-white/5 shadow-lg backdrop-blur-sm"><HelpCircle size={18} /></button>

                    {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
                    {showSettings && <SettingsModal showRevenue={showRevenue} toggleRevenue={toggleRevenueHandler} currentYear={year} setYear={setYearHandler} onClose={() => setShowSettings(false)} />}
                    {detailModal && <DetailsModal title={detailModal.title} items={detailModal.items} onClose={() => setDetailModal(null)} />}
                    
                    {/* GRID SYSTEM */}
                    <div className="grid grid-cols-1 md:grid-cols-12 auto-rows-auto md:auto-rows-[136px] gap-4 md:gap-5 flex-grow pb-4 grid-flow-dense relative z-10">
                        {modules.map((mod) => ( 
                            <div 
                                key={mod.id} 
                                draggable={!resizingId} 
                                onDragStart={(e) => onDragStart(e, mod.id)} 
                                onDragEnd={onDragEnd} 
                                onDragOver={(e) => e.preventDefault()} 
                                onDrop={() => onDrop(mod.id)} 
                                className={`glass-card animate-in col-span-1 md:col-span-${mod.colSpan} md:row-span-${mod.rowSpan} min-h-[340px] md:min-h-0 ${draggedId === mod.id ? 'dragging' : ''}`}
                            > 
                                {renderModuleContent(mod)} 
                                <div className="resize-handle" onMouseDown={(e) => handleResizeStart(e, mod.id)}></div> 
                            </div> 
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
